# Configuration file for plugin builder tool (pb_tool)
[plugin]
name: UMM STAC DQ4EO Converter

[files]
python_files: __init__.py umm_stac_converter.py umm_to_stac.py stac_to_umm.py umm_to_dq4eo.py dq4eo_to_umm.py converter_dialog.py
main_dialog: converter_dialog_base.ui
resource_files: resources.py resources.qrc
extras: metadata.txt icon.png README.md DQ4EO_CONVERSION.md DQ4EO_QUICK_REFERENCE.md DQ4EO_IMPLEMENTATION_SUMMARY.md examples/dq4eo_granule_example.json examples/dq4eo_collection_example.json
compiled_resource_files: resources.py

[help]
plugin_path: ~/Library/Application Support/QGIS/QGIS3/profiles/default/python/plugins/umm_stac_converter_plugin
